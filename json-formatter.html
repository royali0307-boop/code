    <div class="container">

        <div class="buttons">
            <button onclick="formatJSON()" data-i18n="formatJSON">Format</button>
            <button onclick="minifyJSON()" data-i18n="minifyJSON">Minify</button>
            <button onclick="validateJSON()" data-i18n="validateJSON">Validate</button>
            <button onclick="clearAll()" class="secondary" data-i18n="clearAll">Clear</button>
            <button onclick="copyOutput()" class="secondary" data-i18n="copyOutput">Copy</button>
        </div>

        <div class="status" id="status"></div>

        <div class="editor-container">
            <div class="editor-box">
                <h3 data-i18n="jsonInput">Input JSON</h3>
                <textarea id="inputJSON" placeholder='{"key": "value"}' data-i18n-placeholder="jsonInputPlaceholder"></textarea>
            </div>
            <div class="editor-box">
                <h3 data-i18n="jsonOutput">Output</h3>
                <textarea id="outputJSON" readonly placeholder="Formatted JSON will appear here..." data-i18n-placeholder="jsonOutputPlaceholder"></textarea>
            </div>
        </div>

        <p class="info" data-i18n="jsonInfo">💡 Paste your JSON on the left, click Format to pretty print, or Minify to compress.</p>
    </div>

    <script src="lang.js"></script>
    <script>
        function formatJSON() {
            const input = document.getElementById('inputJSON').value.trim();
            const status = document.getElementById('status');
            const output = document.getElementById('outputJSON');
            
            if (!input) {
                showStatus('error', 'Please enter JSON data');
                return;
            }
            
            try {
                const parsed = JSON.parse(input);
                const formatted = JSON.stringify(parsed, null, 2);
                output.value = formatted;
                showStatus('success', '✅ JSON formatted successfully!');
            } catch (e) {
                showStatus('error', '❌ Invalid JSON: ' + e.message);
                output.value = '';
            }
        }

        function minifyJSON() {
            const input = document.getElementById('inputJSON').value.trim();
            const status = document.getElementById('status');
            const output = document.getElementById('outputJSON');
            
            if (!input) {
                showStatus('error', 'Please enter JSON data');
                return;
            }
            
            try {
                const parsed = JSON.parse(input);
                const minified = JSON.stringify(parsed);
                output.value = minified;
                showStatus('success', '✅ JSON minified successfully!');
            } catch (e) {
                showStatus('error', '❌ Invalid JSON: ' + e.message);
                output.value = '';
            }
        }

        function validateJSON() {
            const input = document.getElementById('inputJSON').value.trim();
            const status = document.getElementById('status');
            
            if (!input) {
                showStatus('error', 'Please enter JSON data');
                return;
            }
            
            try {
                const parsed = JSON.parse(input);
                const size = new Blob([input]).size;
                showStatus('success', `✅ Valid JSON! Size: ${size} bytes, Keys: ${countKeys(parsed)}`);
            } catch (e) {
                showStatus('error', '❌ Invalid JSON: ' + e.message);
            }
        }

        function countKeys(obj) {
            if (typeof obj !== 'object' || obj === null) return 0;
            let count = 0;
            for (let key in obj) {
                count++;
                if (typeof obj[key] === 'object') {
                    count += countKeys(obj[key]);
                }
            }
            return count;
        }

        function clearAll() {
            document.getElementById('inputJSON').value = '';
            document.getElementById('outputJSON').value = '';
            document.getElementById('status').style.display = 'none';
        }

        function copyOutput() {
            const output = document.getElementById('outputJSON').value;
            if (!output) {
                showStatus('error', 'No output to copy');
                return;
            }
            
            navigator.clipboard.writeText(output).then(() => {
                showStatus('success', '✅ Copied to clipboard!');
            }).catch(() => {
                showStatus('error', 'Failed to copy');
            });
        }

        function showStatus(type, message) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.textContent = message;
            setTimeout(() => {
                status.style.display = 'none';
            }, 5000);
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (typeof updateAllPages === 'function') {
                updateAllPages();
            }
        });
    </script>
