    <script src="lang.js"></script>
    <script>
        let calYear = new Date().getFullYear();
        let calMonth = new Date().getMonth();
        
        const monthNames = {
            zh: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12월'],
            en: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
            ko: ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'],
            ja: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
            ms: ['Januari', 'Februari', 'Mac', 'April', 'Mei', 'Jun', 'Julai', 'Ogos', 'September', 'Oktober', 'November', 'Disember'],
            tl: ['Enero', 'Pebrero', 'Marso', 'Abril', 'Mayo', 'Hunyo', 'Hulyo', 'Agosto', 'Setyembre', 'Oktubre', 'Nobyembre', 'Disyembre'],
            gh: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
            ng: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
            uk: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
            in: ['जनवरी', 'फरवरी', 'मार्च', 'अप्रैल', 'मई', 'जून', 'जुलाई', 'अगस्त', 'सितंबर', 'अक्टूबर', 'नवंबर', 'दिसंबर'],
            ph: ['Enero', 'Pebrero', 'Marso', 'Abril', 'Mayo', 'Hunyo', 'Hulyo', 'Agosto', 'Setyembre', 'Oktubre', 'Nobyembre', 'Disyembre']
        };
        const dayNames = {
            zh: ['日', '一', '二', '三', '四', '五', '六'],
            en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            ko: ['일', '월', '화', '수', '목', '금', '토'],
            ja: ['日', '月', '火', '水', '木', '金', '土'],
            ms: ['Aha', 'Isn', 'Sel', 'Rab', 'Kha', 'Jum', 'Sab'],
            tl: ['Lin', 'Lun', 'Mar', 'Miy', 'Huw', 'Biy', 'Sab'],
            gh: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            ng: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            uk: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            in: ['रवि', 'सोम', 'मंगल', 'बुध', 'गुरु', 'शुक्र', 'शनि'],
            ph: ['Lin', 'Lun', 'Mar', 'Miy', 'Huw', 'Biy', 'Sab']
        };
        
        function renderCalendar() {
            const firstDay = new Date(calYear, calMonth, 1);
            const lastDay = new Date(calYear, calMonth + 1, 0);
            const startDay = firstDay.getDay();
            const totalDays = lastDay.getDate();
            const today = new Date();
            
            const monthData = monthNames[currentLang] || monthNames.en;
            const dayData = dayNames[currentLang] || dayNames.en;
            
            document.getElementById('calMonth').textContent = calYear + ' ' + monthData[calMonth];
            
            let html = dayData.map(d => `<div class="day-name">${d}</div>`).join('');
            
            for (let i = 0; i < startDay; i++) {
                html += '<div class="day empty"></div>';
            }
            
            for (let day = 1; day <= totalDays; day++) {
                const dateStr = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isHoliday = holidays2026.some(h => h.date === dateStr);
                const isToday = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === day;
                let cls = 'day';
                if (isToday) cls += ' today';
                if (isHoliday) cls += ' holiday';
                html += `<div class="${cls}">${day}</div>`;
            }
            
            document.getElementById('calGrid').innerHTML = html;
        }
        
        function changeMonth(delta) {
            calMonth += delta;
            if (calMonth > 11) { calMonth = 0; calYear++; }
            if (calMonth < 0) { calMonth = 11; calYear--; }
            renderCalendar();
        }
        
        function updateRecommend() {
            const now = new Date();
            now.setHours(0,0,0,0);
            
            let nextHoliday = null;
            let minDiff = Infinity;
            
            for (const h of holidays2026) {
                const hDate = new Date(h.date);
                const diff = Math.floor((hDate - now) / (1000 * 60 * 60 * 24));
                if (diff >= 0 && diff < minDiff) {
                    minDiff = diff;
                    nextHoliday = { ...h, diff };
                }
            }
            
            const recommendItem = document.getElementById('recommendItem');
            if (nextHoliday) {
                const holidayNames = {
                    'New Year': t('holidayList.New Year'),
                    'Spring Festival': t('holidayList.Spring Festival'),
                    'Qingming': t('holidayList.Qingming'),
                    'Labor Day': t('holidayList.Labor Day'),
                    'Dragon Boat': t('holidayList.Dragon Boat'),
                    'Mid-Autumn': t('holidayList.Mid-Autumn'),
                    'National Day': t('holidayList.National Day')
                };
                const holidayName = holidayNames[nextHoliday.name] || nextHoliday.name;
                
                let giftLink = '';
                let giftIcon = '';
                
                if (nextHoliday.name === 'Qingming' || nextHoliday.name === 'Labor Day' || nextHoliday.name === 'National Day') {
                    giftLink = 'holiday-gift.html';
                    giftIcon = '🎁';
                } else if (nextHoliday.name === 'Dragon Boat' || nextHoliday.name === 'Mid-Autumn') {
                    giftLink = 'summer-gift.html';
                    giftIcon = '🎁';
                } else {
                    giftLink = 'holidays.html';
                    giftIcon = '🎉';
                }
                
                const daysText = t('days');
                const daysLeft = t('daysLeft');
                
                recommendItem.innerHTML = `
                    <div class="icon">${giftIcon}</div>
                    <div class="info">
                        <h4>${holidayName} - ${nextHoliday.date}</h4>
                        <p>${daysLeft} ${holidayName} ${nextHoliday.diff} ${daysText}</p>
                    </div>
                    <div class="countdown">${nextHoliday.diff}${daysText}</div>
                `;
                
                recommendItem.style.cursor = 'pointer';
                recommendItem.onclick = () => window.location.href = giftLink;
            }
        }
        
        function changeLang(lang) {
            localStorage.setItem('lang', lang);
            window.currentLang = lang;
            if (typeof updateLang === 'function') updateLang();
            updateAllPages();
            renderCalendar();
            updateRecommend();
        }
        
        if (!window.currentLang) {
            window.currentLang = localStorage.getItem('lang') || 'en';
        }
        
        renderCalendar();
        updateAllPages();
        
        document.getElementById('langSelect').addEventListener('change', function() {
            changeLang(this.value);
        });
    </script>
