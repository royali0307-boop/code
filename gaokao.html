<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考倒计时</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #00d2ff;
            text-decoration: none;
            margin-bottom: 30px;
        }
        .lang-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #00d2ff;
            font-size: 0.9rem;
            border: 1px solid rgba(0,210,255,0.3);
            cursor: pointer;
        }
        .countdown-box {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 50px 30px;
            margin: 30px 0;
        }
        .date-info {
            color: #aaa;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .countdown {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.5;
        }
        .tips {
            color: #888;
            margin-top: 30px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <select class="lang-switch" id="langSelect" onchange="changeLang(this.value)">
        <option value="zh">🌐 中文</option>
        <option value="en">🌐 English</option>
        <option value="ko">🌐 한국어</option>
        <option value="ja">🌐 日本語</option>
        <option value="ms">🌐 Bahasa Melayu</option>
        <option value="tl">🌐 Filipino</option>
    </select>
    <div class="container">
        <a href="index.html" class="back-btn" data-i18n="backHome">← 返回首页</a>
        <h1 data-i18n="gaokao">📚 高考倒计时</h1>
        
        <div class="countdown-box">
            <div class="date-info" id="dateInfo">2026年高考日期: 2026年6月7日</div>
            <div class="countdown" id="countdown">加载中...</div>
        </div>
        
        <p class="tips" data-i18n="tips">乾坤未定，你我皆是黑马！加油！🏫</p>
    </div>

    <script src="lang.js"></script>
    <script>
        function updateCountdown() {
            const gaokaoDate = new Date('2026-06-07');
            const now = new Date();
            const diff = gaokaoDate - now;
            
            if (diff <= 0) {
                document.getElementById('countdown').textContent = t('gaokaoStarted');
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            const daysText = t('days');
            document.getElementById('countdown').textContent = 
                `${days} ${daysText} ${hours} ${t('hours') || '时'} ${minutes} ${t('minutes') || '分'} ${seconds} ${t('seconds') || '秒'}`;
        }
        
        function updateGaokaoPage() {
            const year = '2026';
            const monthDay = '6月7日';
            document.getElementById('dateInfo').textContent = `${year}${t('gaokaoDate')} ${monthDay}`;
        }
        
        updateCountdown();
        updateGaokaoPage();
        setInterval(updateCountdown, 1000);
        
        document.addEventListener('DOMContentLoaded', function() {
            updateAllPages();
        });
    </script>
</body>
</html>
