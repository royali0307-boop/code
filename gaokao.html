    <script>
        function updateCountdown() {
            const gaokaoDate = new Date('2026-06-07');
            const now = new Date();
            const diff = gaokaoDate - now;
            
            if (diff <= 0) {
                document.getElementById('countdown').textContent = t('gaokaoStarted');
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            const daysText = t('days');
            document.getElementById('countdown').textContent = 
                `${days} ${daysText} ${hours} ${t('hours') || '时'} ${minutes} ${t('minutes') || '分'} ${seconds} ${t('seconds') || '秒'}`;
        }
        
        function updateGaokaoPage() {
            const year = '2026';
            const monthDay = '6月7日';
            document.getElementById('dateInfo').textContent = `${year}${t('gaokaoDate')} ${monthDay}`;
        }
        
        updateCountdown();
        updateGaokaoPage();
        setInterval(updateCountdown, 1000);
        
        document.addEventListener('DOMContentLoaded', function() {
            updateAllPages();
        });
    </script>
