<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏日礼物推荐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #00d2ff;
            text-decoration: none;
            margin-bottom: 20px;
        }
        .lang-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #00d2ff;
            font-size: 0.9rem;
            border: 1px solid rgba(0,210,255,0.3);
            cursor: pointer;
        }
        .gift-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .gift-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }
        .gift-card .icon { font-size: 3rem; margin-bottom: 15px; }
        .gift-card h4 { color: #fff; margin-bottom: 8px; }
        .gift-card p { color: #aaa; font-size: 0.85rem; margin-bottom: 10px; }
        .gift-card .price { color: #00d2ff; font-size: 1.2rem; font-weight: bold; }
        .gift-card .buy-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 20px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            max-width: 350px;
        }
        .modal-content h3 { color: #333; margin-bottom: 15px; }
        .modal-content .product-info { color: #666; margin-bottom: 20px; }
        .modal-content .qr-code {
            width: 200px;
            height: 200px;
            background: #f5f5f5;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 0.9rem;
        }
        .modal-content .qr-code img { width: 100%; height: 100%; object-fit: contain; }
        .modal-content .pay-tip { color: #888; font-size: 0.85rem; margin-bottom: 15px; }
        .modal-content .pay-amount { color: #333; font-size: 1.1rem; margin-bottom: 15px; font-weight: bold; }
        .modal-content .pay-amount span { color: #00d2ff; }
        .modal-content .close-btn {
            padding: 10px 30px;
            background: #ddd;
            border: none;
            border-radius: 20px;
            color: #333;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <select class="lang-switch" id="langSelect" onchange="changeLang(this.value)">
        <option value="zh">🌐 中文</option>
        <option value="en">🌐 English</option>
        <option value="ko">🌐 한국어</option>
        <option value="ja">🌐 日本語</option>
        <option value="ms">🌐 Bahasa Melayu</option>
        <option value="tl">🌐 Filipino</option>
    </select>
    <div class="container">
        <a href="index.html" class="back-btn" data-i18n="backHome">← 返回首页</a>
        <h1 data-i18n="summerGift">🎁 夏日礼物推荐</h1>
        <div class="gift-grid" id="giftGrid"></div>
    </div>

    <div class="modal" id="payModal">
            <div class="modal-content">
            <h3>购买确认</h3>
            <div class="product-info" id="productInfo"></div>
            <div class="pay-amount">实付金额: <span id="payAmount"></span></div>
            <div class="qr-code" id="qrCode"></div>
            <div class="pay-tip">请使用支付宝扫码支付，完成后可在订单中查看</div>
            <button class="close-btn" onclick="closeModal()">关闭</button>
        </div>
    </div>

    <script src="lang.js"></script>
    <script>
        const giftData = {
            en: [
                { name: 'Portable Fan', desc: 'Essential for a cool summer', price: '$15', icon: '🌀' },
                { name: 'Sun Hat', desc: 'Lightweight and breathable', price: '$25', icon: '🧢' },
                { name: 'Sunscreen Spray', desc: 'UV protection', price: '$20', icon: '🧴' },
                { name: 'Cooling Mat', desc: 'Instant cooling', price: '$18', icon: '🧊' },
                { name: 'Water Bottle', desc: 'Keep hydrated', price: '$22', icon: '🥤' },
                { name: 'Beach Toy Set', desc: 'Beach vacation essential', price: '$35', icon: '🏖️' }
            ],
            ko: [
                { name: '便携형 선풍기', desc: '시원한 여름 필수', price: '₩20,000', icon: '🌀' },
                { name: '선모자', desc: '가볍고 통기성', price: '₩35,000', icon: '🧢' },
                { name: '선스프레이', desc: '자외선 차단', price: '₩25,000', icon: '🧴' },
                { name: '쿨링 매트', desc: '즉시 시원함', price: '₩25,000', icon: '🧊' },
                { name: '물병', desc: '수분 유지', price: '₩30,000', icon: '🥤' },
                { name: '비치 토이 세트', desc: '해변 휴가 필수', price: '₩50,000', icon: '🏖️' }
            ],
            ja: [
                { name: '卓上ファン', desc: '夏に必要なもの', price: '¥2000', icon: '🌀' },
                { name: '日除け帽子', desc: '軽くて通気性良好', price: '¥3000', icon: '🧢' },
                { name: '日焼け止め喷雾', desc: 'UVケア', price: '¥2500', icon: '🧴' },
                { name: '冷却マット', desc: '瞬間クールダウン', price: '¥2500', icon: '🧊' },
                { name: '水筒', desc: '水分補給', price: '¥3000', icon: '🥤' },
                { name: 'ビーチおもちゃセット', desc: 'ビーチバカンス必备', price: '¥5000', icon: '🏖️' }
            ],
            ms: [
                { name: 'Kipas Boleh Sara', desc: 'Perkara penting untuk musim panas', price: 'RM60', icon: '🌀' },
                { name: 'Topi matahari', desc: 'Ringan dan selesa', price: 'RM100', icon: '🧢' },
                { name: ' semburan matahari', desc: 'Perlindungan UV', price: 'RM80', icon: '🧴' },
                { name: 'Alas sejuk', desc: 'Penyejukan serta-merta', price: 'RM70', icon: '🧊' },
                { name: 'Botol air', desc: 'Sentiasa hidrat', price: 'RM90', icon: '🥤' },
                { name: 'Mainan Pantai', desc: 'Perkara penting untuk percutian pantai', price: 'RM150', icon: '🏖️' }
            ],
            tl: [
                { name: 'Portable Fan', desc: ' Mahalaga para sa tag-init', price: '₱500', icon: '🌀' },
                { name: 'Sun Hat', desc: 'Magaan at maginhawang', price: '₱800', icon: '🧢' },
                { name: 'Sunscreen Spray', desc: 'Proteksyon sa UV', price: '₱600', icon: '🧴' },
                { name: 'Cooling Mat', desc: 'Agarang paglamig', price: '₱600', icon: '🧊' },
                { name: 'Water Bottle', desc: 'Manatiling hydrated', price: '₱700', icon: '🥤' },
                { name: 'Beach Toy Set', desc: 'Mahalaga para sa vacation', price: '₱1200', icon: '🏖️' }
            ],
            zh: [
                { name: '便携小风扇', desc: '清凉一夏必备', price: '¥49', icon: '🌀' },
                { name: '防晒遮阳帽', desc: '轻薄透气防晒', price: '¥89', icon: '🧢' },
                { name: '水晶防晒喷雾', desc: '防晒保湿隔离', price: '¥129', icon: '🧴' },
                { name: '清凉冰凉垫', desc: '瞬间降温', price: '¥69', icon: '🧊' },
                { name: '大容量水杯', desc: 'Keep运动水壶', price: '¥79', icon: '🥤' },
                { name: '沙滩玩具套装', desc: '海边度假必备', price: '¥159', icon: '🏖️' }
            ]
        };
        
        const priceConfig = {
            '便携小风扇': 49,
            '防晒遮阳帽': 89,
            '水晶防晒喷雾': 129,
            '清凉冰凉垫': 69,
            '大容量水杯': 79,
            '沙滩玩具套装': 159
        };
        
        function renderGifts() {
            const gifts = giftData[currentLang] || giftData.zh;
            document.getElementById('giftGrid').innerHTML = gifts.map(g => {
                const actualPrice = priceConfig[g.name] || parseFloat(getPriceValue(g.price));
                return `
                <div class="gift-card">
                    <div class="icon">${g.icon}</div>
                    <h4>${g.name}</h4>
                    <p>${g.desc}</p>
                    <div class="price" data-actual-price="${actualPrice}">${g.price}</div>
                    <button class="buy-btn" onclick="showPay('${g.name}', '${g.price}', ${actualPrice})">立即购买</button>
                </div>
            `}).join('');
        }

        function getPriceValue(priceStr) {
            return priceStr.replace(/[^0-9.]/g, '');
        }

        function validatePriceFormat(priceStr) {
            const regex = /^[¥$₩₱RM]\s*\d+(\.\d{1,2})?$/;
            if (!regex.test(priceStr.trim())) {
                return { valid: false, msg: '金额格式不正确' };
            }
            const num = parseFloat(getPriceValue(priceStr));
            if (isNaN(num) || num <= 0) {
                return { valid: false, msg: '金额必须大于0' };
            }
            return { valid: true, value: num };
        }

        function verifyDisplayPrice(displayPrice, actualValue) {
            const displayValue = getPriceValue(displayPrice);
            if (displayValue !== actualValue.toString()) {
                return { valid: false, msg: '显示金额与实际金额不符' };
            }
            return { valid: true };
        }

        function showPay(productName, price, actualValue) {
            const validation = validatePriceFormat(price);
            if (!validation.valid) {
                alert('价格格式校验失败: ' + validation.msg);
                return;
            }
            
            const verify = verifyDisplayPrice(price, actualValue);
            if (!verify.valid) {
                alert('金额校验失败: ' + verify.msg);
                return;
            }
            
            document.getElementById('productInfo').textContent = productName;
            document.getElementById('payAmount').textContent = `¥${actualValue}`;
            
            const qrCode = document.getElementById('qrCode');
            qrCode.innerHTML = `<img src="E:/opencode/tool package/image/Image_20260403045141.jpg" alt="支付宝收款码" style="width:200px;height:200px;">`;
            
            document.getElementById('payModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('payModal').classList.remove('active');
        }
        
        renderGifts();
        
        document.addEventListener('DOMContentLoaded', function() {
            updateAllPages();
        });
    </script>
</body>
</html>
